<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker 💸</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Tracker 💸</h1>
            <button id="theme-toggle" class="btn-icon">🌙</button>
        </header>

        <section class="summary-cards">
            <div class="card budget-card">
                <h3>Budget</h3>
                <div class="budget-input-group">
                    <span>₹</span>
                    <input type="number" id="budget-input" placeholder="Set Budget">
                </div>
            </div>
            <div class="card total-card">
                <h3>Total Expenses</h3>
                <h2 id="total-expense">₹0</h2>
            </div>
            <div class="card balance-card">
                <h3>Remaining Balance</h3>
                <h2 id="remaining-balance">₹0</h2>
                <p id="budget-warning" class="warning hidden">⚠️ Over Budget!</p>
            </div>
        </section>

        <div class="main-grid">
            <div class="left-column">
                <section class="card form-section">
                    <h2>Add Expense</h2>
                    <form id="expense-form">
                        <div class="form-group">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" required min="1">
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="Food">🍔 Food</option>
                                <option value="Travel">🚗 Travel</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Bills">🧾 Bills</option>
                                  <option value="Vegetable">🧾pruchase vegetable</option>
                                <option value="Other">✨ Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <button type="submit" class="btn-primary">Add Expense</button>
                    </form>
                </section>

                <section class="card filter-section">
                    <h2>Filters</h2>
                    <div class="filter-group">
                        <select id="filter-month">
                            <option value="all">All Months</option>
                            <option value="01">January</option>
                            <option value="02">February</option>
                            <option value="03">March</option>
                            <option value="04">April</option>
                            <option value="05">May</option>
                            <option value="06">June</option>
                            <option value="07">July</option>
                            <option value="08">August</option>
                            <option value="09">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                        <select id="filter-category">
                            <option value="all">All Categories</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </section>
            </div>

            <div class="right-column">
                <section class="card chart-section">
                    <h2>Expense Distribution</h2>
                    <canvas id="expenseChart"></canvas>
                </section>

                <section class="card list-section">
                    <h2>Recent Expenses</h2>
                    <div class="expense-list" id="expense-list">
                        </div>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
